      - name: Check Prism version
        run: npx prism --version
name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock server (direct)
        run: |
          nohup npx prism mock contracts/access-gate.openapi.yaml -p 4010 --host 0.0.0.0 > prism-gate.log 2>&1 &

      - name: Wait a bit for Prism
        run: sleep 20

      - name: Show Prism logs (pre-wait)
        run: |
          echo "========== PRISM LOG =========="
          cat prism-gate.log || true


      - name: Wait for mock server
        run: |
          npx wait-on http://127.0.0.1:4010/health --timeout 60000 || (echo "Prism failed to start, log output:" && cat prism-gate.log && exit 1)

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-gate.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/